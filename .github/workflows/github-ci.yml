name: CI Pipeline

on:
  push:
    branches: [ master ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential

      - name: Build
        run: ./build.sh
        working-directory: ./cicd

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: usr/bin/matrix_check

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt install -y build-essential

      - name: Prepare binary
        run: mkdir -p usr/bin

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary
          path: usr/bin

      - name: Make binary executable
        run: chmod +x usr/bin/matrix_check

      - name: Run tests
        run: ./test.sh
        working-directory: ./cicd

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dpkg
        run: sudo apt install -y dpkg-dev

      - name: Prepare binary
        run: mkdir -p usr/bin

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary
          path: usr/bin

      - name: Build deb
        run: ./deploy.sh "../matrix-check.deb"
        working-directory: ./cicd

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: matrix-check.deb

  docker:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download deb
        uses: actions/download-artifact@v4
        with:
          name: deb-package

      - name: Build Docker image
        run: docker build -t matrix-check .

      - name: Run container
        run: docker run --rm matrix-check
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag image
        run: docker tag matrix-check sharap754/matrix-check:latest

      - name: Push image
        run: docker push sharap754/matrix-check:latest
